/**
 * Reproduce un archivo MP3 desde una URL.
 * @param {string} url - La dirección del archivo .mp3
 */
function reproducirMP3(url) {
    // 1. Creamos la instancia del objeto Audio
    const audio = new Audio(url);

    // 2. Intentamos reproducir
    audio.play()
        .then(() => {
            console.log("Reproduciendo: " + url);
        })
        .catch(error => {
            // Los navegadores modernos bloquean el audio si el usuario 
            // no ha interactuado con la página primero (clic, tap, etc.)
            console.error("Error al reproducir el audio: ", error);
            alert("Haz clic en la página primero para permitir la reproducción.");
        });

    // Opcional: Retornamos el objeto por si quieres pausarlo luego
    return audio;
}

			function get_mesh_color(material_name){
			    for(let indice_mesh = 0; indice_mesh < skin_meshes.length; indice_mesh++){
			        const skin_mesh = skin_meshes[indice_mesh];
			        
			        if(!("material" in skin_mesh) || skin_mesh.material == null){
			          //alert(skin_mesh.name + " no tiene Materials!!");
			          continue;
			        }

			        let material;
					if(skin_mesh.material instanceof Array){
						material = skin_mesh.material.find(item => item.name == material_name);
					}else if (skin_mesh.material.name == material_name){
						material = skin_mesh.material;
					}
			        
			        if(material){
			            // TODO: convertir material.color a hexadecimal Rgb
			            //alert("debo descifrar color");
			            let rojo = Math.ceil( material.color.r * 255, 0 ).toString(16);
						if(rojo.length == 1){
							rojo = "0" + rojo;
						}
			            let verde = Math.ceil( material.color.g * 255, 0 ).toString(16);
			            if(verde.length == 1){
							verde = "0" + verde;
						}						
						let azul = Math.ceil( material.color.b * 255, 0 ).toString(16);
						if(azul.length == 1){
							azul = "0" + azul;
						}
			            return `#${rojo}${verde}${azul}`;
			        }
			    }
			    return "#000000";
			}
			
			function set_mesh_color(material_name, value){
			    if(value.length<7){
			        return;
			    }
			    const rojo = parseInt(value.substring(1,3), 16) / 255.0;
			    const verde = parseInt(value.substring(3,5), 16) / 255.0;
			    const azul = parseInt(value.substring(5,7), 16) / 255.0;
			    skin_meshes.forEach(skin_mesh => {

					if(!("material" in skin_mesh) || skin_mesh.material == null){
			          alert(skin_mesh.name + " no tiene Materials!!");
			          return;
			        }

					if(skin_mesh.material instanceof Array){
						skin_mesh.material.filter(item => item.name == material_name).forEach(item =>{
							item.color.r = rojo;
							item.color.g = verde;
							item.color.b = azul;
							if("specular" in item){
							    item.specular.r = (1 - rojo)/16;
							    item.specular.g = (1 - verde)/16;
							    item.specular.b = (1 - azul)/16;
							}
						});
					}else if(skin_mesh.material.name == material_name){
						skin_mesh.material.color.r = rojo;
						skin_mesh.material.color.g = verde;
						skin_mesh.material.color.b = azul;
						if("specular" in skin_mesh.material){
							    skin_mesh.material.specular.r = (1 - rojo)/16;
							    skin_mesh.material.specular.g = (1 - verde)/16;
							    skin_mesh.material.specular.b = (1 - azul)/16;
							}
					}
			    });
			}

				function cargarAnimacion(vpd, nombre_animacion) {
					
					// busca si la animacion actual tiene una camara
					const camara_animacion = vpd.children.find(item => item.type == "PerspectiveCamera");
					if(camara_animacion){
						console.log("Se ha detectado la camara " + camara_animacion.name);
						console.log(`Posicion x:${camara_animacion.position.x}, y:${camara_animacion.position.y}, z:${camara_animacion.position.z}`);						
						const w_vector = camara_animacion.getWorldDirection(camara_animacion.position);
						console.log(`Viendo hacia x:${w_vector.x}, y:${w_vector.y}, z:${w_vector.z}`);						
						camaras[nombre_animacion] = camara_animacion;
					}

					if('animations' in vpd && vpd.animations.length > 0){
						const animation_clip = vpd.animations.find(item=>{
							if(vpd.animations.length == 1){
								item.name = nombre_animacion;
								return true;
							}
							const partes_nombre = item.name.split("|");
							const nombre = partes_nombre[1];
							return nombre == nombre_animacion;
						});
						if(animation_clip){
							const partes_nombre = animation_clip.name.split("|");
							const nombre = partes_nombre[1];
							const accion = animationMixer.clipAction(animation_clip);
							accion.name = nombre_animacion ;
							return accion;
						};
					} else if('clip' in vpd){
						const nombre = nombre_animacion.toLowerCase();
						//vpd.clip.tracks = vpd.clip.tracks.filter(item=>item.name.indexOf("root.") != 0);
						//vpd.clip.tracks = vpd.clip.tracks.filter(item=>item.name.indexOf(".quaternion") >= 0);
						const accion = animationMixer.clipAction(vpd.clip);
						accion.name = nombre ;
						return accion;
					}
					return null;
				}

				class AnimacionFBX{
					constructor(label,path){
						this.label = label;
						this.path = path;
						this.accion = null;
					}
					getAccion(){
						return new Promise((resolve, reject)=>{
							if(this.accion != null){
								resolve(this.accion);
							}else{
								modalProgreso.show();
								fbxLoader.load(this.path + "?" + Date.now() , async (object)=>{
									this.accion = cargarAnimacion(object, this.label);
									resolve(this.accion);
								}, onProgress, null );
							}
						});
					}
				}

				const modelFile = 'models/fbx/miku_mesh.fbx?'+ (Date.now());

					new AnimacionFBX('Pose08','models/fbx/pose08.fbx'),

				fbxLoader.load( modelFile, async ( object ) => {

					mesh = object;

					scene.add( mesh );

					initGui();
					console.log("GUI inicializada");

						await bvhLoader.load(bvhFile, async bvh=>{

					*/
				}, onProgress, null );

				

				window.addEventListener( 'resize', onWindowResize );

				function initGui() {

					const dictionary = {};
					
					if(morphing_mesh){
						const dictionary_raw = morphing_mesh.morphTargetDictionary;
						Object.keys(dictionary_raw).forEach(item=>{
							let clave = item;
							if( Object.keys(traducciones).indexOf(item) >= 0 ){
								clave = traducciones[item];
							}
							dictionary[clave] = dictionary_raw[item];
						})
					}
					
					
					const controls = {};
					const keys = [];

					function initControls() {

						for ( const key in dictionary ) {

							controls[ key ] = 0.0;

						}

						controls.pose = - 1;

						for ( let i = 0; i < bvhFiles.length; i ++ ) {

							controls[ bvhFiles[ i ].label ] = false;

						}

					}

					function initKeys() {
						//console.log("========\nLISTA DE CLAVES\n==========");
						for ( const key in dictionary ) {
							//console.log(`"${key}" : "",`);
							keys.push( key );

						}

					}

					function initPoses() {

						const files = { default: - 1 };

						for ( let i = 0; i < bvhFiles.length; i ++ ) {							
							files[ bvhFiles[i].label ] = i;
						}
     
						// poses.add( controls, 'pose', files ).onChange( onChangePose );
						
						const selPoses = document.getElementById("selPoses");
						
						Object.keys(files).forEach(file=>{
						    const opcion = document.createElement("option");
						    opcion.value = files[file];
						    opcion.innerText = file;
						    selPoses.appendChild(opcion);
						    if(file=="default"){
						        opcion.selected = true;
						    }
						});
						
						selPoses.addEventListener("change", onChangePose);
						
					}

					function initMorphs() {
					
					 	const divMorphs = document.getElementById("divMorphs");
						divMorphs.innerHTML = "";
						
						for ( const key in dictionary ) {

							// morphs.add( controls, key, 0.0, 1.0, 0.01 ).onChange( onChangeMorph );
							const indice = dictionary[key];
							const divRow = document.createElement("div");
							divRow.classList.add("row","mt-1");
							const label = document.createElement("label");
							label.classList.add("col");
							label.innerText = key.replaceAll("_", " ");
							const slider = document.createElement("input");
							slider.classList.add("col","form-range");
							slider.type="range";
							slider.min = 0.0;
							slider.max = 1.0;
							slider.step = 0.1;
							slider.value = 0.0;
							slider.id = `sldMorph${indice}`;
							slider.dataset.textoid = `txtMorph${indice}`;
							slider.dataset.morph_key = key;
							const texto = document.createElement("input");
							texto.value=0;
							texto.classList.add("col","form-control","ml-2");
							texto.id = `txtMorph${indice}`;
							texto.dataset.sliderid = `sldMorph${indice}`;
							texto.dataset.indice = indice;
							texto.disabled = true;
							divRow.appendChild(label);
							divRow.appendChild(slider);
							divRow.appendChild(texto);
							divMorphs.appendChild(divRow);
							slider.addEventListener('change', onChangeMorphSlider);
							
						}

					}
					
					function initLayers(){
					    const divLayers = document.getElementById("divLayers");
					    divLayers.innerHTML = "";
						//localStorage.removeItem("Miku.Visibilidad");
						if (localStorage.getItem("Miku.Visibilidad") != null){
							visibilidad = JSON.parse(localStorage.getItem("Miku.Visibilidad"));
						}else{
							visibilidad = {};
						}
					    skin_meshes.forEach(anim_mesh => {
					        const row = document.createElement("div");
					        row.classList.add("row");
					        const check = document.createElement("input");
					        check.type = "checkbox";
					        check.classList.add( "form-check", "form-switch", "col-1");
					        check.dataset.mesh_id = anim_mesh.name;
					        row.appendChild(check);
					        const label = document.createElement("label");
					        label.innerText = anim_mesh.name;
					        label.classList.add("form-label", "col");
					        row.appendChild(label);
					        divLayers.appendChild(row);
					        check.addEventListener('click', onChangeCheckLayer);							
							
					        check.checked = anim_mesh.name == morphing_mesh.name || anim_mesh.name in visibilidad && visibilidad[anim_mesh.name] || !(anim_mesh.name in visibilidad) && anim_mesh.name.indexOf("Miku.") == 0 ;
							visibilidad[anim_mesh.name] = check.checked;
							anim_mesh.visible = check.checked;
					    });	

						localStorage.setItem("Miku.Visibilidad", JSON.stringify(visibilidad));
					}
					
					function onChangeCheckLayer(event){
					    const check = event.target;
					    const anim_mesh = skin_meshes.find(item => item.name == check.dataset.mesh_id);
					    if(anim_mesh){
					        //alert("mostrar/ocultar " + check.dataset.mesh_id);
					        anim_mesh.visible = check.checked;
							visibilidad[anim_mesh.name] = check.checked;
							localStorage.setItem("Miku.Visibilidad", JSON.stringify(visibilidad));
					    }else{
					        alert("no encontré " + check.dataset.mesh_id);
					    }
					}
					
					function onChangeMorphSlider(event){
					  const slider = event.target;
					  const texto = document.getElementById(slider.dataset.textoid);
					  texto.value = slider.value;
					  controls[slider.dataset.morph_key] = parseFloat(slider.value);
					  onChangeMorph();
					}

					function onChangeMorph() {

						for ( let i = 0; i < keys.length; i ++ ) {

							const key = keys[ i ];
							const value = controls[ key ];
							if(morphing_mesh){
								morphing_mesh.morphTargetInfluences[ i ] = value;
							}
							

						}

					}

					async function onChangePose() {
					 
						const selPoses = document.getElementById("selPoses");
						//const index = parseInt( controls.pose );
						const chkPoseTemporal = document.getElementById("chkPoseTemporal");
						const divOpciones = document.getElementById("divOpciones");
						const index = parseInt(selPoses.value);

						if(currentAction != null){
							currentAction.stop();
							//animationMixer.update(1);
						}

						if ( index === - 1 ) {

							//mesh.pose();
							/*		
							if(defaultAction !=null){
								currentAction = defaultAction;
								currentAction.play();
							}
							*/					
							currentAction = null;
							ajustarCamara(0);

						} else {
							
							//helper.pose( mesh, vpds[ index ] );
							currentAction = await bvhFiles[ index ].getAccion();
							if(currentAction != null){
								currentAction.play();
								ajustarCamara(currentAction.name);
							}							
							
							if(chkPoseTemporal.checked){
							    setTimeout(()=>{
							        selPoses.value=-1;
							        onChangePose();
							    },5000);
							}
						}
						animationMixer.update(1);
						
    					divOpciones.classList.remove("show");
					}

					procesadorMensaje = ()=>{
						if( !bufferMensaje || bufferMensaje.length == 0 ){
							return;
						}
						const gesto = morphs_by_pattern.find(item=>{
							return bufferMensaje.indexOf(item.patron) == 0;
						});
						for(const clave in controls){
							if(gesto && clave in gesto.morphs){
								controls[clave] = gesto.morphs[clave];
							}else{
								controls[clave] = 0.0;
							}
						}
						onChangeMorph();
						if(gesto){
							bufferMensaje = bufferMensaje.substring(gesto.patron.length);
						}else{
							bufferMensaje = bufferMensaje.substring(1);
						}
					};

					const txtMensaje = document.getElementById("txtMensaje");
					const btnMensaje = document.getElementById("btnMensaje");
					const chkModoConversacion = document.getElementById("chkModoConversacion");
					const chkLocucion = document.getElementById("chkLocucion");

					btnMensaje.addEventListener("click",async ()=>{
						const texto = txtMensaje.value;
						if(texto.trim().length == 0){
							return;
						}
						if(chkModoConversacion.checked){
						  const formData = new FormData();
						  formData.append("texto",texto);
						  try{
						    const respuesta = await fetch("/eliza", {method:"POST", body: formData});
						    if(respuesta.status != 200){
						      throw {message:"Error " + respuesta.status};
						    }
						    const respuesta_json = await respuesta.json();
						    await mostrarToast( respuesta_json.texto);
						  }catch(ex){
						    await mostrarToast(ex.message);
						  }
						  
						}else{
						  await mostrarToast(texto);
						}
						txtMensaje.value = "";
					});

					async function mostrarToast(mensaje){
						const toastMensaje = document.getElementById("toastMensaje");						
						const toastBody = toastMensaje.getElementsByClassName("toast-body")[0];
						toastBody.innerText = mensaje;
						const tostada = new bootstrap.Toast(toastMensaje);
						tostada.show();
						if(chkLocucion.checked){
						    const formData = new FormData();
					    	formData.append("texto",mensaje);
					    	const resultado_hablar = await fetch("/hablar", {method:"POST", body:formData });
							if(resultado_hablar.ok){
								const result_text = await resultado_hablar.text();
								if( result_text != "OK"){
									reproducirMP3( result_text + "?" + Date.now() );
								}
							}
						}
						bufferMensaje = mensaje.toLowerCase();
					}
					
					function initMaterials(){
						const divMaterials = document.getElementById("divMaterials");
					 	divMaterials.innerHTML = "";
						//localStorage.removeItem("Miku.Materials");
						if (localStorage.getItem("Miku.Materials") != null){
							materials = JSON.parse(localStorage.getItem("Miku.Materials"));
						}else{
							materials = [];
						}
						material_list.forEach(material_name => {
							let material = materials.find(item => item.nombre == material_name);
							if(!material){
								material = {nombre:material_name, color: get_mesh_color(material_name) };
								materials.push(material);
							}
							material.default_color = get_mesh_color(material_name);
							set_mesh_color(material_name, material.color);

							// alert("1 procesando " + material_name);
							const row = document.createElement("div");
							row.classList.add("row");
							const label = document.createElement("label");
							label.classList.add("col", "form-label");
							label.innerText = material_name;
						  	const span = document.createElement("span");
						  	span.classList.add("col");
						  	const color_picker = document.createElement("input");
						  	// alert("2 procesando " + material_name);
						  	color_picker.classList.add( "form-control","xpd-material-picker");
							color_picker.type="color";
							color_picker.dataset.material_name = material_name;
							// alert("3 procesando " + material_name);
							color_picker.value = material.color;

							const span_default = document.createElement("span");
							span_default.classList.add("col");
							const btn_default = document.createElement("button");
							btn_default.classList.add("btn","btn-secondary");
							btn_default.dataset.material_name = material_name;
							btn_default.innerText = "Restaurar";							

							//alert("4 procesando " + material_name);
							span.appendChild(color_picker);
							span_default.appendChild(btn_default);
							row.appendChild(label);
							row.appendChild(span);
							row.appendChild(span_default);
							divMaterials.appendChild(row);
							color_picker.addEventListener("change", onChangeMaterialText);
							btn_default.addEventListener("click", onClickMaterialButton);
						});
						localStorage.setItem("Miku.Materials", JSON.stringify(materials));
						//alert("Materials Cargado");
					}
					
					function onChangeMaterialText(event){
					    const color_picker = event.target;
					    const material_name = color_picker.dataset.material_name;
					    const valor = color_picker.value;
					    set_mesh_color(material_name, valor);
						const material = materials.find(item=> item.nombre == material_name);
					    material.color = valor;
					    localStorage.setItem("Miku.Materials", JSON.stringify(materials));
					}

					function onClickMaterialButton(event){
						const btn_default = event.target;
					    const material_name = btn_default.dataset.material_name;
						const material = materials.find(item=> item.nombre == material_name);
						material.color = material.default_color;
						const color_pickers = document.getElementsByClassName("xpd-material-picker");
						for(let indice = 0; indice < color_pickers.length; indice++){
							const color_picker = color_pickers[indice];
							if(color_picker.dataset.material_name == material_name){
								color_picker.value = material.color;
								break;
							}
						}
						set_mesh_color(material_name, material.color);
					}

					function initLoadApariencias(){
						const divApariencias = document.getElementById("divApariencias");
						divApariencias.innerHTML = "";
						//localStorage.removeItem("Miku.Apariencias");
						if (localStorage.getItem("Miku.Apariencias") != null){
							apariencias = JSON.parse(localStorage.getItem("Miku.Apariencias"));
						}else{
							apariencias = [];
						}

						apariencias.forEach(apariencia => {
							const list_item = document.createElement("div");
							list_item.classList.add("list-group-item");
							const flex_row = document.createElement("div");
							flex_row.classList.add("d-flex", "flex-row", "justify-content-between");
							const enlace = document.createElement("a");
							enlace.href = "#";
							enlace.innerText = apariencia.nombre;
							enlace.classList.add("text-decoration-none");
							enlace.dataset.apariencia = apariencia.nombre;
							const btn_eliminar = document.createElement("a");
							btn_eliminar.innerText = "x";
							btn_eliminar.dataset.apariencia = apariencia.nombre;
							enlace.classList.add("text-decoration-none");
							list_item.appendChild(flex_row);
							flex_row.appendChild(enlace);
							flex_row.appendChild(btn_eliminar);
							divApariencias.appendChild(list_item);
							enlace.addEventListener("click", OnCargarApariencia);
							btn_eliminar.addEventListener("click", OnEliminarApariencia);
						});

						localStorage.setItem("Miku.Apariencias", JSON.stringify(apariencias));
					}

					function initGuardarApariencias(){
						const btnGuardarApariencia = document.getElementById("btnGuardarApariencia");
						const btnResetTxtApariencia = document.getElementById("btnResetTxtApariencia");
						btnGuardarApariencia.addEventListener("click", OnGuardarApariencia);
						btnResetTxtApariencia.addEventListener("click", OnResetTxtApariencia);
					}

					function OnResetTxtApariencia(){
						const txtGuardarApariencia = document.getElementById("txtGuardarApariencia");
						txtGuardarApariencia.value = "";
					}

					function OnGuardarApariencia(){
						const txtGuardarApariencia = document.getElementById("txtGuardarApariencia");
						const nombre = txtGuardarApariencia.value;
						let apariencia = apariencias.find( item => item.nombre == nombre);
						if(apariencia == null){
							apariencia = {"nombre": nombre};
							apariencias.push(apariencia);
						}else if ( ! confirm("Desea reemplazar la Apariencia "+ nombre +"?") ){
							mostrarToast("Se cancela guardado de apariencia.");
							return;
						}
						apariencia.layers = {...visibilidad};
						apariencia.materials = [...materials];
						apariencias.sort( (a,b) => (a.nombre >= b.nombre) ? 1 : -1 ); 
						localStorage.setItem("Miku.Apariencias", JSON.stringify(apariencias));
						initLoadApariencias();
						mostrarToast("Se ha guardado la apariencia " + nombre + ".");
					}

					function OnCargarApariencia(event){
						const enlace = event.target;
						const nombre = enlace.dataset.apariencia;
						const apariencia = apariencias.find(item => item.nombre == nombre);
						if(apariencia == null){
							mostrarToast("No se ha encontrado apariencia " + nombre + ".");
							return;
						}
						localStorage.setItem("Miku.Visibilidad", JSON.stringify(apariencia.layers));
						localStorage.setItem("Miku.Materials", JSON.stringify(apariencia.materials));
						initLayers();
						initMaterials();
						const txtGuardarApariencia = document.getElementById("txtGuardarApariencia");
						txtGuardarApariencia.value = nombre;
						//divOpciones.classList.remove("show");
					}

					function OnEliminarApariencia(event){
						const enlace = event.target;
						const nombre = event.dataset.apariencia;
						const apariencia = apariencias.find(item => item.nombre == nombre);
						if(apariencia == null){
							mostrarToast("No se ha encontrado apariencia " + nombre + ".");
							return;
						}
						const indice = apariencias.indexOf(apariencia);
						apariencias.pop(indice);
						localStorage.setItem("Miku.Apariencias", JSON.stringify(apariencias));
						initLoadApariencias();
						mostrarToast("Se ha eliminado la apariencia " + nombre + ".");
					}



					initControls();
					initKeys();
					initPoses();
					initMorphs();
					initLayers();
					initMaterials();
					initLoadApariencias();
					initGuardarApariencias();

					onChangeMorph();
					onChangePose();

					//poses.open();
					//morphs.open();

				}

			}

			function onWindowResize() {

				camara_actual.aspect = window.innerWidth / window.innerHeight;
				camara_actual.updateProjectionMatrix();

				effect.setSize( window.innerWidth, window.innerHeight );

			}

			//

			async function animate() {
				if(procesadorMensaje){
					procesadorMensaje();
				}
				effect.render( scene, camara_actual );

				await dormir(2000);

			}

		</script>
